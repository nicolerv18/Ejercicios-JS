<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institucion</title>
</head>
<body>
    <h1>Registro de estudiantes</h1>

    <label for="nombre">Nombre y apellido del estudiante:</label>
    <input type="text" id="nombre" placeholder="ej: Juan Pérez"><br><br>
    <label for="documento">Documento del estudiante:</label>
    <input type="text" id="documento" placeholder="ej: 1081199289"><br><br>
    <label for="edad">Edad del estudiante:</label>
    <input type="number" id="edad" placeholder="ej: 15"><br><br>
    <label for="grado">Grado del estudiante:</label>
    <input type="text" id="grado" placeholder="ej: 10"><br><br>
    <label for="Nota final">Nota final del estudiante:</label>
    <input type="number" id="Nota final" placeholder="ej: 4.5"><br><br>

    <button onclick="registrarEstudiante()">Registrar estudiante</button>
    <button onclick="consultarInformacion()">Consultar información</button>
    <button onclick="consultarAprobacion()">Consultar aprobación</button>
    
</body>
</html>

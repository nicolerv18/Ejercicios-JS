<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
</head>

<body>

<h1>Calculadora</h1>

<form>

<input type="number" id="number1" style="display:block; margin-bottom:5px;" placeholder="Número 1">

<input type="number" id="number2" style="display:block; margin-bottom:5px;" placeholder="Número 2">

<button type="button" id="sumar"><span style="font-size:20px;">+</span></button>
<button type="button" id="restar"><span style="font-size:20px;">-</span></button>
<button type="button" id="multiplicar"><span style="font-size:20px;">X</span></button>
<button type="button" id="dividir"><span style="font-size:20px;">/</span></button>

<button type="button" id="boton" style="font-size:20px;">=</button>

<div id="resultado"></div>

</form>

<script src="Ejercicio7.js"></script>

</body>
</html>
